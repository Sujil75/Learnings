<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Transitions and Animations</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <section>
            <!-- <h1 class="heading-1">Hello, World!</h1> -->
            <h1 class="animate slideInLeft animate--fast">Hello, World!</h1>
            <h2 class="animate slideInLeft animate--slow">Hello, World!</h2>
            <h3 class="animate slideInLeft animate--delay--1s">Hello, World!</h3>
            <h4 class="animate slideInLeft animate--delay--1s animate--infinite">Hello, World!</h4>
            <h5 class="animate slideInLeft animate--infinite">Hello, World!</h5>
        </section>
        
        <script src="" async defer></script>
    </body>
</html>
